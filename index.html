<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmere Quest Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Cosmere Quest Log</h1>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="progress-text">0% Explored</p>
        </header>

        <div class="controls">
            <label for="order-select">Reading Order:</label>
            <select id="order-select" onchange="renderMap(localBookData)">
                <option value="modified">Modified (Tiered)</option>
                <option value="publication">Publication (Linear)</option>
            </select>
        </div>

        <div id="book-list">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
